version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: interviewai_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - interviewai_network

  backend:
    build: ./backend
    container_name: interviewai_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/interviewai
      - JWT_SECRET=interviewai_super_secret_key_change_in_production_2024
      - JWT_EXPIRE=7d
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLIENT_URL=http://localhost
    depends_on:
      - mongodb
    volumes:
      - uploads_data:/usr/src/app/uploads
    networks:
      - interviewai_network

  frontend:
    build: ./frontend
    container_name: interviewai_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - interviewai_network

volumes:
  mongo_data:
  uploads_data:

networks:
  interviewai_network:
    driver: bridge
